<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Date Picker & Event Sorting</title>

    <!-- jQuery & jQuery UI -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://code.jquery.com/ui/1.12.1/jquery-ui.js"></script>
    <link rel="stylesheet" href="https://code.jquery.com/ui/1.12.1/themes/base/jquery-ui.css">

    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f4f4f4;
            margin: 0;
        }
        .container {
            text-align: center;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
            width: 400px;
        }
        input, button {
            margin: 10px;
            padding: 8px;
            font-size: 16px;
        }
        #event-list {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0;
        }
        .event-card {
            width: 90%;
            background: lightblue;
            margin: 8px;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            box-shadow: 0px 2px 5px rgba(0, 0, 0, 0.2);
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Sort Events Based on Date</h2>

        <!-- Date Picker Input -->
        <label for="date">Select a Date:</label>
        <input type="text" id="date">
        <button id="sortButton">Sort Events</button>

        <h3>Event List:</h3>
        <ul id="event-list">
            <li class="event-card" data-date="2025-03-15">Conference - 15 March 2025</li>
            <li class="event-card" data-date="2025-02-28">Workshop - 28 February 2025</li>
            <li class="event-card" data-date="2025-04-10">Seminar - 10 April 2025</li>
            <li class="event-card" data-date="2025-01-20">Meetup - 20 January 2025</li>
        </ul>
    </div>

    <script>
        $(document).ready(function() {
            // Initialize jQuery UI Date Picker
            $("#date").datepicker({
                dateFormat: "yy-mm-dd"
            });

            // Sorting and Filtering Events
            $("#sortButton").click(function() {
                let selectedDate = $("#date").val();
                if (!selectedDate) {
                    alert("Please select a date first.");
                    return;
                }

                let selectedDateObj = new Date(selectedDate);
                let events = $("#event-list li").get();

                // Remove past events if the selected date is today or future
                events = events.filter(event => {
                    let eventDate = new Date($(event).data("date"));
                    return eventDate >= selectedDateObj; // Keep future and current events
                });

                if (events.length === 0) {
                    $("#event-list").html("<p>No upcoming events.</p>");
                    return;
                }

                // Sort events based on how close they are to the selected date
                events.sort(function(a, b) {
                    let dateA = Math.abs(new Date($(a).data("date")) - selectedDateObj);
                    let dateB = Math.abs(new Date($(b).data("date")) - selectedDateObj);
                    return dateA - dateB;
                });

                // Append sorted and filtered events back to the list
                $("#event-list").empty().append(events);
            });
        });
    </script>
</body>
</html>
