<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fetch API - Display User Data</title>

    <!-- CSS Styling for Better UI -->
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f8f9fa;
            margin: 20px;
        }
        h2 {
            color: #333;
        }
        .container {
            max-width: 800px;
            margin: auto;
            padding: 20px;
            background: #fff;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
            border-radius: 8px;
        }
        .user-card {
            background: #f1f1f1;
            margin: 10px 0;
            padding: 10px;
            border-radius: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .user-info {
            text-align: left;
        }
        .user-name {
            font-size: 18px;
            font-weight: bold;
        }
        .email {
            font-size: 14px;
            color: #555;
        }
    </style>
</head>
<body>

    <h2>Users List (Fetched via Fetch API)</h2>
    <div class="container">
        <div id="user-list"></div> <!-- Users will be inserted here -->
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const apiURL = "https://jsonplaceholder.typicode.com/users"; // API Endpoint

            console.log("Fetching data from:", apiURL); // Step 1: Logging API URL

            fetch(apiURL)  
                .then(response => {
                    console.log("Raw Response:", response); // Step 2: Log raw response from API

                    if (!response.ok) {  
                        throw new Error(HTTP Error! Status: ${response.status}); // Step 3: Handle HTTP errors
                    }
                    return response.json(); // Step 4: Convert response to JSON
                })
                .then(data => {
                    console.log("JSON Data:", data); // Step 5: Log JSON data after conversion

                    let userList = document.getElementById("user-list");

                    // Step 6: Loop through each user and create UI elements
                    data.forEach(user => {
                        let userCard = document.createElement("div");
                        userCard.classList.add("user-card");

                        userCard.innerHTML = `
                            <div class="user-info">
                                <p class="user-name">${user.name}</p>
                                <p class="email">${user.email}</p>
                                <p>📍 Address: ${user.address.street}, ${user.address.city}</p>
                                <p>📞 Phone: ${user.phone}</p>
                            </div>
                        `;

                        userList.appendChild(userCard); // Step 7: Append user details to the UI
                    });
                })
                .catch(error => {
                    console.error("Error fetching data:", error.message); // Step 8: Catch and log errors
                    document.getElementById("user-list").innerHTML = <p style="color:red;">Failed to load data. Please try again.</p>;
                });
        });
    </script>

</body>
</html>
